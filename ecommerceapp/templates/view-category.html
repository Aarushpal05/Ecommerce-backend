{% extends "header.html" %}
{% load static %}

{% block 'content' %}


<div class="container mt-4">
    <h2>Category List</h2>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Category Name</th>
                <th>Image</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for x in categories %}
            <tr>
                <td>{{ x.name }}</td>
                <td>
                    <img src="{{ x.pic.url }}" width="100" height="100">
                </td>
                <td>
            <a href="updatecategory/{{x.id}}" class="btn btn-warning">Update</a>
            <a href="delete_category/{{x.id}}" class="btn btn-danger">Delete</a>

                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
