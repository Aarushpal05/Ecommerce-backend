{% extends "header.html" %}
{% load static %}

{% block 'content' %}   

<table class="table table-bordered table-striped">
<thead>
    <tr>
        <th>name</th>
        <th>Category</th>
        <th>price</th>
        <th>selling_price</th>
        <th>description</th>
        <th>productimage</th>
        <th>Action</th>
    </tr>
</thead>

<tbody>
     {% for x in products %}

     <tr>
         <td>{{x.name}}</td>
         <td>{{x.category}}</td>
         <td>{{x.price}}</td>
         <td>{{x.selling_price}}</td>
         <td>{{x.description}}</td>
         <td><img src='{{x.pic.url}}' width="100" height="100"></td>
         <td><a href="updateproduct/{{x.id}}" class="btn btn-warning">Update</a>
             <a href="deleteproduct/{{x.id}}" class="btn btn-danger" onclick="return confirm('Are you Sure You Want to Delete')">Delete</a>
         </td>
    </tr>

    {% endfor %}
</tbody>

{% endblock %}
